dataset:
  # 全域范围（供 sfc.rs 使用）。请按你的数据真实范围填写
  lat_range: [39.0, 41.0]
  lon_range: [115.0, 118.0]
  time_range: [1176268800, 1343433600]  # 2007-04-11 ~ 2012-07-28 

sfc:
  algorithm: "z3"
  center_lat: 39.9
  max_depth: 24
  max_nodes: 50000
  tail_bits_guard: null
  #time_bucket_s: 604800 # day：86400 , week：604800 , month：2592000
  max_ranges: null # null 表示不限制

data:
  csv_path: "geolife_clean.csv"
  max_ingest: null # geolife_clean.csv 有 19632236 条记录,null 表示全部 ingest

output:
  result_dir: "results"

network:
  num_nodes: 1024

placement:
  mode: "vnode"      # 可切换 "vnode" | "smart_vnode"| "baseline"
  vnodes_per_node: 100

experiment:
  stop_tail_bits: 6  # 表示最小区块边长
  print_first: 15
  debug: false
  prefix_bits: null  

  metrics:
    compute_node_cover: true
    save_with_nodes: true
    precise_hits: true

  queries:
    - name: "forbidden_city"
      lat_min: 39.906
      lon_min: 116.386
      lat_max: 39.923
      lon_max: 116.411
      t_start: "2008-08-01T03:00:00Z"
      t_end:   "2008-08-10T03:15:00Z"
    - name: "Guomao_CBD"
      lat_min: 39.906
      lon_min: 116.440
      lat_max: 39.923
      lon_max: 116.480
      t_start: "2008-08-01T03:00:00Z"
      t_end:   "2008-08-10T03:15:00Z"
    - name: "Changping_District"
      lat_min: 40.080
      lon_min: 116.220
      lat_max: 40.150
      lon_max: 116.300
      t_start: "2008-08-01T03:00:00Z"
      t_end:   "2008-08-10T03:15:00Z"