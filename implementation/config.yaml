dataset:
  # 全域范围（供 sfc.rs 使用）。请按你的数据真实范围填写
  lat_range: [39.5, 40.2]
  lon_range: [116.0, 116.8]
  time_range: [1175385600, 1356998400]  # 2007-12-01 ~ 2012-12-31 (示例，单位：秒)

sfc:
  algorithm: "z3"
  center_lat: 39.9
  x_precision_m: 10  # sfc区块精度，经度10米
  y_precision_m: 10  # sfc区块精度，纬度10米
  t_precision_s: 60 # sfc区块精度，时间60秒
  time_bucket_s: 60  #供z2t/h2t使用，z3/h3忽略
  max_ranges: 1024

data:
  csv_path: "geolife_clean.csv"
  max_ingest: 20000000 # geolife_clean.csv 有 20,369,284 条记录,null 表示全部 ingest

output:
  result_dir: "results"

network:
  num_nodes: 64

experiment:
  # 这里保留一份口径，用于 window.txt 展示与 planner 的 gap/max_ranges 等控制
  algorithm: "z3"
  center_lat: 39.9
  x_precision_m: 10
  y_precision_m: 10
  t_precision_s: 60
  stop_tail_bits: 8
  merge_gap_keys: 255  # 2^k - 1,k=8 表示允许的最大 gap
  max_ranges: 512    # 这里是实验的 max_ranges
  print_first: 15

  placement:
    mode: "baseline"       # 未来可切换 "vnode" | "smart_vnode"
    per_node: 8
    vnode_bits: 9
    smart:
      hot_prefix_top_k: 0.1
      split_factor_bits: 1
      rebalance_cooldown_s: 300
      co_placement_jaccard: 0.4

  metrics:
    compute_node_cover: true
    save_with_nodes: true
    precise_hits: false

  queries:
    - name: "forbidden_city"
      lat_min: 39.906
      lon_min: 116.386
      lat_max: 39.923
      lon_max: 116.411
      t_start: "2008-06-01T03:00:00Z"
      t_end:   "2008-06-10T03:15:00Z"
    - name: "beijing"
      lat_min: 39.5
      lon_min: 116.0
      lat_max: 40.2
      lon_max: 116.8
      t_start: "2012-05-10T22:00:00Z"
      t_end:   "2012-05-20T01:00:00Z"